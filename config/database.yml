default: &default
  adapter: postgresql
  encoding: unicode
  pool: 12

development:
  <<: *default
  database: signon_development
  url: <%= ENV["DATABASE_URL"]%>

test:
  <<: *default
  database: signon_test
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  database: signon
  url: <%= ENV["DATABASE_URL"]%>
